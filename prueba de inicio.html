<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDNIGTH - Fixed</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a0a;
            color: #eee;
            overflow: hidden; /* Bloqueamos el scroll al inicio */
        }

        /* --- PANTALLA DE INTRO (OVERLAY) --- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer; /* Manito de click */
            transform-origin: center center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            /* Asegura que el usuario sepa que es interactivo */
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        .intro-content-wrapper {
            text-align: center;
            pointer-events: none; /* El click pasa al contenedor padre */
        }

        .brand-name {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.8), 0 0 30px rgba(138, 43, 226, 0.4);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.1rem;
            color: #aaa;
            letter-spacing: 3px;
            border-top: 1px solid #8a2be2;
            padding-top: 15px;
            display: inline-block;
        }

        .click-hint {
            margin-top: 60px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #8a2be2;
            animation: pulso 2s infinite ease-in-out;
        }

        /* --- ANIMACIÓN VÓRTICE ORGÁNICO --- */
        .vortex-effect {
            animation: organicVortex 1.8s cubic-bezier(0.7, 0, 0.3, 1) forwards;
            pointer-events: none; 
        }

        @keyframes organicVortex {
            0% {
                transform: rotate(0deg) scale(1);
                opacity: 1;
                filter: blur(0px);
            }
            40% {
                transform: rotate(180deg) scale(0.9);
                filter: blur(2px);
            }
            100% {
                transform: rotate(1080deg) scale(0.05);
                opacity: 0;
                filter: blur(40px);
            }
        }

        @keyframes pulso {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            opacity: 0;
            transition: opacity 1.5s ease-out;
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            display: none;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; margin-top: 60px; }
        .card { background: #141414; border: 1px solid #2a2a2a; padding: 25px; transition: transform 0.3s; }
        .card:hover { border-color: #8a2be2; transform: translateY(-5px); }
        .placeholder-img { width: 100%; height: 180px; background: linear-gradient(45deg, #222, #1a1a1a); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; color: #444; letter-spacing: 2px;}
        h1 { letter-spacing: 5px; margin-bottom: 5px; }
        h1 + p { color: #8a2be2; letter-spacing: 2px; margin-top: 0;}

        /* Ajuste Responsive para móviles */
        @media (max-width: 600px) {
            .brand-name { font-size: 2.5rem; letter-spacing: 4px; }
        }

    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-content-wrapper">
            <div class="brand-name">MIDNIGTH</div>
            <div class="tagline">mech de fans para fans</div>
            <div class="click-hint">// CLICK PARA ACCEDER //</div>
        </div>
    </div>

    <main id="main-content">
        <h1>COLECCIÓN GÉNESIS</h1>
        <p>System Online. Welcome User.</p>
        
        <div class="grid">
            <div class="card">
                <div class="placeholder-img">[ITEM_01]</div>
                <h3>Neural Tee</h3>
                <p>$35.00</p>
            </div>
            <div class="card">
                <div class="placeholder-img">[ITEM_02]</div>
                <h3>Void Hoodie</h3>
                <p>$65.00</p>
            </div>
            <div class="card">
                <div class="placeholder-img">[ITEM_03]</div>
                <h3>Data Cap</h3>
                <p>$25.00</p>
            </div>
        </div>
    </main>

    <script>
        // Esperamos a que el DOM cargue (buena práctica)
        document.addEventListener('DOMContentLoaded', () => {
            
            const overlay = document.getElementById('intro-overlay');
            const mainContent = document.getElementById('main-content');
            const body = document.body;

            // Función para iniciar la secuencia
            function startSequence() {
                // 1. Iniciar animación CSS
                overlay.classList.add('vortex-effect');

                // 2. Mostrar contenido de fondo (invisible aún por opacidad)
                setTimeout(() => {
                    mainContent.style.display = 'block';
                    // Pequeño delay para permitir que el CSS procese el display block antes de cambiar opacidad
                    setTimeout(() => {
                        mainContent.style.opacity = '1';
                    }, 50);
                }, 1000);

                // 3. Finalizar intro y permitir scroll
                setTimeout(() => {
                    overlay.style.display = 'none';
                    // CORRECCIÓN AQUÍ: Usamos style.overflow, no style.overflow-y
                    body.style.overflow = 'auto'; 
                }, 1800);
            }

            // Escuchamos el click
            overlay.addEventListener('click', startSequence);
            
            // Opcional: Permitir tecla enter también
            window.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') startSequence();
            });
        });
    </script>
</body>
</html>
